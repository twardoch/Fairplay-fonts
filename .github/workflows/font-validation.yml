name: font-validation

on:
  push:
    paths:
      - "fonts/**"
      - "tests/**"
      - ".github/workflows/font-validation.yml"
  pull_request:
    paths:
      - "fonts/**"
      - "tests/**"
      - ".github/workflows/font-validation.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install fontTools
        run: python -m pip install --upgrade "fonttools>=4.50"

      - name: Validate shipped fonts
        run: python tests/validate_fonts.py
